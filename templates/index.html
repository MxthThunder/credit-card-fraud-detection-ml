<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Credit Card Fraud Detection</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px}h1{color:#60a5fa;margin-bottom:20px}.container{max-width:1000px;margin:0 auto}.card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px;border:1px solid #334155}label{display:block;margin:10px 0 5px;font-size:14px;color:#94a3b8}input{width:100%;padding:8px;background:#0f172a;border:1px solid#475569;border-radius:5px;color:#e2e8f0;font-size:14px}input:focus{outline:none;border-color:#3b82f6}.features{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:15px 0}.btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin-top:10px}.btn:hover{background:#1d4ed8}.btn-sec{background:#475569;margin-top:5px}.result{margin-top:20px;padding:15px;border-radius:8px;display:none}.fraud{background:rgba(239,68,68,0.2);border:2px solid #ef4444;color:#f87171}.legit{background:rgba(34,197,94,0.2);border:2px solid #22c55e;color:#4ade80}.result h2{margin-bottom:10px}.prob{margin:10px 0;font-size:14px}</style></head><body><div class="container"><h1>🔍 Credit Card Fraud Detection System</h1><div class="card"><h3 style="color:#93c5fd;margin-bottom:15px">Transaction Input</h3><label>Time (seconds)</label><input type="number" id="time" value="3600"><label>PCA Features V1-V28</label><div class="features" id="vf"></div><label>Amount ($)</label><input type="number" id="amount" value="149.62" step="0.01"><button class="btn" onclick="predict()">🔎 Analyze Transaction</button><button class="btn btn-sec" onclick="loadSample('fraud')">Load Fraud Sample</button><button class="btn btn-sec" onclick="loadSample('legit')">Load Legit Sample</button><div class="result" id="res"></div></div></div><script>const vDiv=document.getElementById('vf');for(let i=1;i<=28;i++){const inp=document.createElement('input');inp.type='number';inp.id='v'+i;inp.placeholder='V'+i;inp.value=(Math.random()*2-1).toFixed(3);inp.step='0.001';vDiv.appendChild(inp)}async function predict(){const t=parseFloat(document.getElementById('time').value)||0;const a=parseFloat(document.getElementById('amount').value)||0;const v=[];for(let i=1;i<=28;i++)v.push(parseFloat(document.getElementById('v'+i).value)||0);const features=[t,...v,a];try{const r=await fetch('/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({features})});const d=await r.json();const div=document.getElementById('res');const isFraud=d.prediction===1;div.className='result '+(isFraud?'fraud':'legit');div.style.display='block';div.innerHTML='<h2>'+(isFraud?'⚠️ FRAUD DETECTED':'✅ LEGITIMATE')+'</h2><div class="prob">Fraud Probability: <strong>'+d.fraud_probability+'%</strong></div><div class="prob">Legitimate: '+d.legitimate_probability+'%</div><div class="prob">Risk Level: '+d.risk_level+'</div>'}catch(e){alert('Error: '+e.message)}}function loadSample(type){if(type==='fraud'){document.getElementById('time').value='406';document.getElementById('amount').value='529';const fv=[-3.04,2.54,-2.54,1.37,-0.96,0.46,-0.82,0.35,-0.58,0.09,-2.26,2.32,-0.49,1.55,0.43,-0.55,-0.14,0.24,-0.28,0.22,0.13,-0.11,0.09,-0.18,0.36,0.01,-0.02,0.05];for(let i=1;i<=28;i++)document.getElementById('v'+i).value=fv[i-1]}else{document.getElementById('time').value='36000';document.getElementById('amount').value='12.50';for(let i=1;i<=28;i++)document.getElementById('v'+i).value=(Math.random()*0.4-0.2).toFixed(3)}}</script></body></html>
